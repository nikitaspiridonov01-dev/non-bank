name = "non-bank-receipt-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Workers AI binding — runs Llama 3.2 11B Vision on the same Worker
# (this is provider #3 in the routing pool; zero network hop).
[ai]
binding = "AI"

# D1 database — quota counters + per-device rate limits.
# Replace `database_id` after running `npm run db:create`.
[[d1_databases]]
binding = "DB"
database_name = "non-bank-receipts"
database_id = "66a766fd-a957-4f01-bbb4-7e80968ac7eb"
migrations_dir = "migrations"

# Public env (non-secret). Secret API keys are added via:
#   wrangler secret put GEMINI_API_KEY        # Google AI Studio
#   wrangler secret put GROQ_API_KEY          # console.groq.com
#   wrangler secret put OPENROUTER_API_KEY    # openrouter.ai
#   wrangler secret put MISTRAL_API_KEY       # console.mistral.ai
#   wrangler secret put SAMBANOVA_API_KEY     # cloud.sambanova.ai
#   wrangler secret put NVIDIA_API_KEY        # build.nvidia.com
#   wrangler secret put HUGGINGFACE_API_KEY   # huggingface.co/settings/tokens
#   wrangler secret put IP_HASH_SALT          # any 32+ char random string
[vars]
ENV = "production"
PER_DEVICE_DAILY_LIMIT = "60"
# Per-IP daily cap on /v1/parse-receipt. Higher than per-device because
# legitimate users share NAT/WiFi; an attacker rotating device IDs from
# one host gets blocked here.
PER_IP_DAILY_LIMIT = "200"
# Per-IP 60-second burst cap on GET /share. Renders the HTML preview +
# pixel-cat SVGs, so this is the CPU-heaviest route; cap prevents one
# IP from draining Worker CPU budget.
PER_IP_SHARE_PER_MINUTE_LIMIT = "60"
LOG_LEVEL = "info"

# Note: the [limits] section was removed because cpu_ms is a paid-plan
# feature (the Cloudflare API rejects it on Free with code 100328). The
# Free tier already enforces a 10ms CPU budget, which is plenty here —
# our hot path is `await fetch(provider)` and fetch wait time doesn't
# count against CPU. If you ever upgrade to Workers Paid, you can re-add:
#   [limits]
#   cpu_ms = 30000

# Cron Triggers — daily housekeeping. The `scheduled` handler in
# `src/index.ts` is the entry point; it currently runs
# `sweepExpiredShareItems` (drops rows whose 30-day TTL elapsed).
# 04:10 UTC = off-peak for the EU/RU user base and far from the
# midnight quota-reset boundary in `quota.ts`, so the sweep can't
# race a per-IP counter rollover.
[triggers]
crons = ["10 4 * * *"]

# -----------------------------------------------------------------------------
# Staging environment
# -----------------------------------------------------------------------------
# Why this exists
# ----------------
# Lets us deploy bigger / riskier changes (prompt tweaks, routing rebalances,
# new D1 migrations) and exercise them from a Debug build on a real device
# before catting in prod. The iOS app is wired so:
#   - Debug build (`Cmd+R` from Xcode)        → talks to *-staging worker
#   - Release / TestFlight / App Store build → talks to prod worker
# See `BackendConfig.swift`'s `#if DEBUG` switch for the host selection logic.
#
# What lives in staging
# ---------------------
# A SEPARATE Worker (`non-bank-receipt-proxy-staging`) and a SEPARATE D1
# database (`non-bank-receipts-staging`). That isolation matters because
# `device_quotas` / `ip_quotas` / `share_items` are stateful tables — staging
# writes must NOT pollute prod counters or leak share-items rows. Provider
# API keys are duplicated as staging secrets (same keys are fine — quotas
# are per-key, not per-worker — but they need to exist in this env).
#
# Limits are intentionally loosened so we can stress-test without locking
# ourselves out: 1000 scans/device/day, 5000/IP/day, 300/min on /share.
# Bumping these in prod requires a deliberate redeploy.
#
# Cost
# ----
# Free tier covers up to 10 D1 databases and 100k Worker requests/day
# *across the account*. Staging shares budget with prod; one developer
# testing locally is negligible. See commit `Phase 11` for the headroom
# math.
[env.staging]
name = "non-bank-receipt-proxy-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "non-bank-receipts-staging"
# Replace this id after `wrangler d1 create non-bank-receipts-staging`. The
# id below is a placeholder so `wrangler types` and `wrangler dev --env
# staging` don't fail before the database exists.
database_id = "a44c7869-22aa-4d91-81c1-6ab04a24c53b"
migrations_dir = "migrations"

[env.staging.ai]
binding = "AI"

[env.staging.vars]
ENV = "staging"
# Matched to the top-level prod `[vars]` values so behaviour on
# staging mirrors prod 1:1 — same rate-limit walls, same error
# paths trigger on the same scan counts. The earlier "loose caps"
# variant (1000 / 5000 / 300) was useful for stress-testing but
# masked the real ban-flow UX a Release-build user would hit. Bump
# any of these back up for ad-hoc stress tests; reset to prod
# values when the test is done so staging stays realistic.
PER_DEVICE_DAILY_LIMIT = "60"
PER_IP_DAILY_LIMIT = "200"
PER_IP_SHARE_PER_MINUTE_LIMIT = "60"
LOG_LEVEL = "info"

# Mirrors prod's daily share-items sweep so staging exercises the
# same code path on every push — keeps the cron handler from rotting
# between deploys.
[env.staging.triggers]
crons = ["10 4 * * *"]

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>non-bank</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f7f7f7;
            color: #1c1c1e;
            min-height: 100vh;
        }
        .wrap {
            max-width: 480px;
            margin: 0 auto;
            padding: 80px 24px 40px;
            text-align: center;
        }
        .icon {
            width: 96px;
            height: 96px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #007AFF, #5856D6);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #fff;
        }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
        p { font-size: 15px; line-height: 1.5; color: #6c6c70; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="icon">💸</div>
        <h1>non-bank</h1>
        <p>Split transactions privately. This page hosts share-link routing for the iOS app.</p>
    </div>
</body>
</html>
